<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>47都道府県 リアルタイム投票プラットフォーム</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary-color: #0ea5e9; /* ヒートマップのベース青色 */
            --accent-color: #f97316;  /* 自分が投票した場所のオレンジ */
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            max-width: 600px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 8px 0;
            color: #0f172a;
        }

        .description {
            font-size: 0.95rem;
            color: var(--text-sub);
            line-height: 1.5;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 950px;
        }

        @media (min-width: 768px) {
            .main-container {
                flex-direction: row;
                align-items: flex-start;
            }
        }

        /* 地図コンテナ */
        .map-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            flex: 1;
        }

        svg {
            width: 100%;
            height: auto;
            max-height: 600px;
        }

        .pref {
            cursor: pointer;
            transition: fill 0.2s ease, stroke 0.2s ease;
            stroke: #ffffff;
            stroke-width: 1.5;
            fill: #cbd5e1; /* 初期状態のグレー */
        }

        .pref:hover {
            opacity: 0.85;
            stroke: #334155;
            stroke-width: 2;
        }

        .pref-label {
            font-size: 10px;
            font-weight: bold;
            fill: #334155;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
            user-select: none;
        }

        /* サイドパネル（情報・ランキング） */
        .info-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            width: 100%;
            box-sizing: border-box;
        }

        @media (min-width: 768px) {
            .info-card {
                width: 320px;
            }
        }

        .status-box {
            background: #f1f5f9;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        .ranking-title {
            font-size: 1.1rem;
            margin: 0 0 12px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border-color);
        }

        .ranking-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 380px;
            overflow-y: auto;
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
        }

        .ranking-item:nth-child(1) { font-weight: bold; color: #b45309; background: #fffbeb; }
        .ranking-item:nth-child(2) { font-weight: bold; color: #475569; }
        .ranking-item:nth-child(3) { font-weight: bold; color: #78350f; }

        /* 凡例 */
        .legend {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            font-size: 0.8rem;
            color: var(--text-sub);
        }
        .legend-bar {
            width: 120px;
            height: 10px;
            background: linear-gradient(to right, rgba(14, 165, 233, 0.1), rgba(14, 165, 233, 1));
            border-radius: 4px;
        }
    </style>
</head>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // 【重要】ご自身のFirebaseプロジェクトの設定値に書き換えてください
        
        // Your web app's Firebase configuration
        const firebaseConfig = {
          apiKey: "AIzaSyB0RPiOnZKNXj7Agdbmx-_4TM5zbnlexeA",
          authDomain: "japan-map-vote-db.firebaseapp.com",
          databaseURL: "https://japan-map-vote-db-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "japan-map-vote-db",
          storageBucket: "japan-map-vote-db.firebasestorage.app",
          messagingSenderId: "106990666585",
          appId: "1:106990666585:web:229a2d37504a68c09ac248"
        };

        // Firebaseの初期化
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 47都道府県マスターデータ
        const prefMaster = {
            "JP-01":"北海道","JP-02":"青森県","JP-03":"岩手県","JP-04":"宮城県","JP-05":"秋田県","JP-06":"山形県","JP-07":"福島県",
            "JP-08":"茨城県","JP-09":"栃木県","JP-10":"群馬県","JP-11":"埼玉県","JP-12":"千葉県","JP-13":"東京都","JP-14":"神奈川県",
            "JP-15":"新潟県","JP-16":"富山県","JP-17":"石川県","JP-18":"福井県","JP-19":"山梨県","JP-20":"長野県","JP-21":"岐阜県",
            "JP-22":"静岡県","JP-23":"愛知県","JP-24":"三重県","JP-25":"滋賀県","JP-26":"京都府","JP-27":"大阪府","JP-28":"兵庫県",
            "JP-29":"奈良県","JP-30":"和歌山県","JP-31":"鳥取県","JP-32":"島根県","JP-33":"岡山県","JP-34":"広島県","JP-35":"山口県",
            "JP-36":"徳島県","JP-37":"香川県","JP-38":"愛媛県","JP-39":"高知県","JP-40":"福岡県","JP-41":"佐賀県","JP-42":"長崎県",
            "JP-43":"熊本県","JP-44":"大分県","JP-45":"宮崎県","JP-46":"鹿児島県","JP-47":"沖縄県"
        };

        // 投票データ保持用
        let globalVotes = {};
        Object.keys(prefMaster).forEach(code => { globalVotes[code] = 0; });

        // Firebaseデータのリアルタイム監視・受信処理
        database.ref('votes').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                Object.keys(prefMaster).forEach(code => {
                    globalVotes[code] = data[code] || 0;
                });
                refreshDashboard();
            }
        });

        // 画面描画の更新
        function refreshDashboard() {
            const votesArray = Object.values(globalVotes);
            const maxVote = Math.max(...votesArray);
            const minVote = Math.min(...votesArray);

            // 1. 地図の色の濃淡を更新
            Object.keys(globalVotes).forEach(code => {
                const el = document.getElementById(code);
                if (el) {
                    const votes = globalVotes[code];
                    if (votes === 0) {
                        el.style.fill = "#cbd5e1"; // 0票は初期グレー
                    } else {
                        const ratio = maxVote === minVote ? 0.5 : (votes - minVote) / (maxVote - minVote);
                        el.style.fill = `rgba(14, 165, 233, ${0.15 + ratio * 0.85})`; 
                    }
                }
            });

            // 2. 右側ランキングリストの更新
            const sortedPrefs = Object.keys(globalVotes).sort((a, b) => globalVotes[b] - globalVotes[a]);
            const rankingListEl = document.getElementById('ranking-list');
            rankingListEl.innerHTML = '';

            sortedPrefs.forEach((code, index) => {
                const li = document.createElement('li');
                li.className = 'ranking-item';
                li.innerHTML = `<span>${index + 1}. ${prefMaster[code]}</span><span>${globalVotes[code]} 票</span>`;
                rankingListEl.appendChild(li);
            });
        }

        // クリック（投票アクション）イベント
        document.querySelectorAll('.pref').forEach(el => {
            el.addEventListener('click', (e) => {
                const prefId = e.target.id;
                
                database.ref('votes/' + prefId).transaction((currentVotes) => {
                    return (currentVotes || 0) + 1;
                });
                
                document.querySelectorAll('.pref').forEach(p => p.style.stroke = "#ffffff");
                e.target.style.stroke = "var(--accent-color)";
                
                document.getElementById('voted-status').innerHTML = `🎉 ${prefMaster[prefId]} に投票しました！`;
            });
        });

        // 初回表示の実行
        refreshDashboard();
    </script>
